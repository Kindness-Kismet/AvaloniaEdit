name: Publish NuGet Package to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'src/AvaloniaEdit/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/publish-nuget.yml'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore src/AvaloniaEdit/AvaloniaEdit.csproj

      - name: Build and pack
        run: dotnet pack src/AvaloniaEdit/AvaloniaEdit.csproj -c Release -o nupkg

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nupkg
          publish_branch: gh-pages
          force_orphan: true

